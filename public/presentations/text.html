    <script type="text/spectacle">
      () => {

        // (We can't link in / require files, but we can approximate here.)
        // --------------------------------------------------------------------
        // Customize the default theme.
        const { themes: { defaultTheme } } = Spectacle;
        const theme = defaultTheme({
          primary: "#ffffff",
          
            fonts: {
          header: '"arizona", Helvetica, Arial, sans-serif',
          text: '"Open Sans Condensed", Helvetica, Arial, sans-serif'
        }
        });

        // Example source code for a source code slide.
        const exampleDeck = `
return (
  <Deck transition={['zoom','slide']} transitionDuration={800}>
    <Slide bgColor="primary">
      <Heading size={1} fit caps>
        React Presentations
      </Heading>
      <Heading size={2} fit caps>
        Written In React
      </Heading>
    </Slide>
    <Slide bgColor="black">
      <Heading size={1} fit textColor="primary" textFont="secondary">
        Wait What?
      </Heading>
    </Slide>
    <Slide bgColor="primary" textColor="black" align="center top">
      <Heading size={1} textColor="black" textFont="primary">
        Thats right
      </Heading>
      <List>
        <ListItem>Inline style based theme system</ListItem>
        <ListItem>Autofit Text</ListItem>
        <ListItem>PDF Export</ListItem>
      </List>
    </Slide>
  </Deck>
)
        `.trim();

        // Interactive code.
        const { Component } = React;
        const { Heading } = Spectacle;

        class Interactive extends Component {
          constructor() {
            super();
            this.state = {
              count: 0
            };
            this.handleClick = this.handleClick.bind(this);
          }
          handleClick() {
            this.setState({
              count: this.state.count + 1
            });
          }
          render() {
            const styles = {
              padding: 20,
              background: "black",
              minWidth: 300,
              marginTop: 20,
              textTransform: "uppercase",
              border: "none",
              color: "white",
              outline: "none",
              fontWeight: "bold",
              fontSize: "2em"
            };
            return (
              <div>
              {this.state.count < 5 ?
                <div>
                  <Heading size={5} textColor="black">
                    The button has been clicked {this.state.count} times
                  </Heading>
                  <button style={styles} type="button" onClick={this.handleClick}>Click Me</button>
                </div> :
                  <Heading size={5} fit caps textColor="black">Easy there pal</Heading>
                }
              </div>
            );
          }
        }

        // --------------------------------------------------------------------
        // The presentation!
        // --------------------------------------------------------------------
        return (
          <Deck transition={["zoom", "slide"]} theme={theme} transitionDuration={500}>
            <Slide transition={["zoom"]} bgColor="black">
             <Heading></Heading><Text  textFont="arizona" textColor="white" size={6}   textColor="white" textAlign="right" margin="0px -39px 0px 400px">

Christopher Heher + Text 
</Text>
<Text  textFont="arizona" textColor="white" textSize="32px"   textColor="white" textAlign="right" margin="0px -39px 0px 400px">


</Text>

            </Slide>
           


<Slide transition={["slide"]} bgColor="white">
<Heading size={6} bold textAlign="left"  textFont="arizona"   margin="120px 0px 0px -100px"     textColor="black">    </Heading>
    <Text textColor="black"  textFont="arizona" textSize="40px" margin="-208px 298px -3px -80px" textAlign="left"  > 
    Home page review       
     </Text>

</Slide>

<Slide transition={["slide"]} bgColor="#28282B">
  <div style={{ display: "flex", flexDirection: "row", alignItems: "center", width: "100%", height: "100%", padding: "20px 0" }}>
    {/* Left: Text Column */}
    <div style={{ flex: 1, paddingRight: "0px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
    <Text textColor="white" textFont="arizona" textSize="32px" textAlign="left" margin="-33px -113px 20px -160px">
    
      Suggestion #1:<br /> Say something above the fold only Text can say.
    
      </Text>
    <Text textColor="white" textFont="arizona" textSize="20px" textAlign="left"  margin="0 0 20px -160px">
    
      Users give websites 50 milliseconds before deciding whether to engage with content below the fold or bounce. Which means it's imperative brands differentiate themselves at first glance. <br/><br/>Tweaking above the fold messaging to match  Text's value prop "Upgrade your agents from support to sales" would be more effective.
    
      </Text>
    </div>

    {/* Right: Images Column */}
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "16px" }}>
      <Image  width="100%"  margin="0 0 20px 250px" src={"../ABC/atf.png"} />
      <Image  width="100%" margin="0 0 20px 250px" src={"../ABC/atf2.png"} />
    </div>

  </div>
</Slide>

<Slide transition={["slide"]} bgColor="#28282B">
  <div style={{ display: "flex", flexDirection: "row", alignItems: "center", width: "100%", height: "100%", padding: "20px 0" }}>

      Suggestion #2:<br /> Balance the buttons.
   
    </Text>
    <Text textColor="white" textFont="arizona" textSize="20px" textAlign="left"  margin="0 30px 20px -150px">
      
  Generally you want a 1:1 ratio between content off-ramps (customer stories, blog posts, etc.) and signup forms. All nine buttons on the home page link to the trial signup page. Because of this, Text denies its users opportunities to better understand their value prop before making they make their decision.
      
  </Text>
   
      </div>

    {/* Right: Images Column */}
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "16px" }}>
              <Image  margin="0 0 20px 200px" src={"../ABC/butts.png"} />
        <Image height="200px" width="100%" margin="0 0 20px 200px" src={"../ABC/cust.png"} />
<Text textColor="white" textFont="arizona" textSize="16px" textAlign="center"  margin="-30px 0 0px 160px">
      
  <i>I felt a little bamboozled thinking this button was to read the Wembley case study.</i>
      </Text>
    </div>

  </div>
</Slide>
  

<Slide transition={["slide"]} bgColor="#28282B">

      Suggestion #3:<br />Dial in the call to action
   
    </Text>
    <Text textColor="white" textFont="arizona" textSize="20px" textAlign="left"  margin="0 10px 20px -150px">

      </Text>
   
      </div>

    {/* Right: Images Column */}
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "16px" }}>
      
            <Image  width="100%"  margin="0 0 20px 200px" src={"../ABC/atf.png"} />

      <Image height="200px" width="100%" margin="0 0 20px 200px" src={"../ABC/footer.png"} />

  </div>
</Slide>

<Slide transition={["slide"]} bgColor="white">
<Heading size={6} bold textAlign="left"  textFont="arizona"     textColor="white">    </Heading>
    <Text textColor="black"  textFont="arizona" textSize="40px" margin="-80px 0px 0px -100px" textAlign="left"  > 
  Hesitant buyer page review       
     </Text>
</Slide>

 <Slide transition={["slide"]} bgColor="#28282B">
  <div style={{ display: "flex", flexDirection: "row", alignItems: "center", width: "100%", height: "100%", padding: "20px 0" }}>
    {/* Left: Text Column */}
    <div style={{ flex: 1, paddingRight: "0px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
    <Text textColor="white" textFont="arizona" textSize="32px" textAlign="left" margin="0 10px 20px -150px">
       
      Suggestion #1:<br />Rotate objections in above the fold copy
   
    </Text>
   
    <Text textColor="white" textFont="arizona" textSize="20px" textAlign="left"  margin="0 0 20px -150px">
      
     Text can complement the "I'm not sure" phrase with a range of objections ("let me think on it", "I'm just browsing", "I can find it cheaper somewhere else") using a simple text rotation plugin.
      
    </Text>
   
      </div>

    {/* Right: Images Column */}
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "16px" }}>
        <Image  margin="0 0 20px 200px" src={"../ABC/rotate.png"} />

    </div>

  </div>
</Slide>
<Slide transition={["slide"]} bgColor="#28282B">
  <div style={{ display: "flex", flexDirection: "row", alignItems: "center", width: "100%", height: "100%", padding: "20px 0" }}>
    {/* Left: Text Column */}
    <div style={{ flex: 1, paddingRight: "0px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
    <Text textColor="white" textFont="arizona" textSize="32px" textAlign="left" margin="-90px 10px 20px -100px">

    </Text>
    <Text textColor="white" textFont="arizona" textSize="20px" textAlign="left"  margin="0 100px 20px -100px">
      
      The title "Converting Hesitant Buyers" reads like a top-of-funnel awareness play but content on the page is more product-focused, reflecting a middle-funnel strategy.

       <Image  margin="0 0 20px 120px" src={"../ABC/sales.png"} /> 
      <Image  margin="0 0 20px 120px" src={"../ABC/dash.png"} />

  </div>
</Slide>


 
 <Slide transition={["slide"]} bgColor="#28282B">
  <div style={{ display: "flex", flexDirection: "row", alignItems: "center", width: "100%", height: "100%", padding: "20px 0" }}>
    {/* Left: Text Column */}
    <div style={{ flex: 1, paddingRight: "0px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
    <Text textColor="white" textFont="arizona" textSize="32px" textAlign="left" margin="0 10px 20px -150px">
       
      Suggestion #3: Get one layer deeper 
   
    </Text>
    <Text textColor="white" textFont="arizona" textSize="20px" textAlign="left"  margin="0 50px 20px -150px">
While the awareness vs. product content doesn't need to be binary, content should deliver context on the claims made above the fold. 
      
</Text>
   
      </div>

    {/* Right: Images Column */}
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "16px" }}>
        <Image margin="0 0 20px 200px" height="130%" src={"../ABC/claim.png"} />

    </div>

  </div>
</Slide>
 <Slide transition={["slide"]} bgColor="#28282B">
  <div style={{ display: "flex", flexDirection: "row", alignItems: "center", width: "100%", height: "100%", padding: "20px 0" }}>
    {/* Left: Text Column */}

    <Text textColor="white" textFont="arizona" textSize="32px" textAlign="left" margin="0 10px 20px -150px">
       
      Suggestion #4:<br />Change "isn't" to "shouldn't be" in footer
   
    </Text>
    <Text textColor="white" textFont="arizona" textSize="20px" textAlign="left"  margin="0 0 20px -150px">
      
 It's a solid insight, and could also work as the headline above the fold.

 
      
</Text>
   
      </div>

    </div>

  </div>
</Slide>
  <Slide transition={["zoom"]} bgColor="black">
             <Heading></Heading><Text  textFont="arizona" textColor="white" size={6}   textColor="white" textAlign="right" margin="10px -39px 0px 400px">

Thank you for your attention.

</Text>
<Text textSize="14px" textColor="white" textFont="arizona" textAlign="right" margin="166px -30px -100px 408px">

</Text>
            </Slide>
          </Deck>
        );
      }
    </script>
